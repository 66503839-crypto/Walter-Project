# 生产环境：App + PostgreSQL + Redis + Nginx
services:
  postgres:
    image: postgres:16-alpine
    container_name: minigamer-pg
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Shanghai
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: minigamer-redis
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - internal

  app:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: minigamer-app
    restart: always
    env_file:
      - .env
    environment:
      APP_ENV: prod
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal
      - web
    expose:
      - "8000"

  nginx:
    image: nginx:1.27-alpine
    container_name: minigamer-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    networks:
      - web

volumes:
  pg-data:
  redis-data:

networks:
  internal:
  web:
