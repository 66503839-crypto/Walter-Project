# Nginx 配置：反代到 FastAPI
# 开发阶段可以只监听 80，上线后建议配 443 HTTPS（微信小程序强制 HTTPS）

upstream minigamer_app {
    server app:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    location /api/ {
        proxy_pass http://minigamer_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 流式响应
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    location /health {
        proxy_pass http://minigamer_app/health;
    }

    location / {
        return 200 '{"service":"MiniGamer","status":"running"}';
        add_header Content-Type application/json;
    }
}

